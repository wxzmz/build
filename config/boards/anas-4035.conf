# Rockchip RK3588S octa core 4/8/16GB RAM SoC NVMe USB3 USB-C GbE
BOARD_NAME="ANAS 4035"
BOARD_VENDOR="friendlyelec"
BOARDFAMILY="rockchip-rk3588"
BOARD_MAINTAINER="efectn"
BOOTCONFIG="anas-4035-rk3588s_defconfig" # vendor name, not standard, see hook below, set BOOT_SOC below to compensate
BOOT_SOC="rk3588"
KERNEL_TARGET="current,edge,vendor"
KERNEL_TEST_TARGET="vendor,current"
FULL_DESKTOP="yes"
BOOT_LOGO="desktop"
IMAGE_PARTITION_TABLE="gpt"
BOOT_FDT_FILE="rockchip/rk3588s-anas-4035.dtb"
BOOT_SCENARIO="spl-blobs"
declare -g UEFI_EDK2_BOARD_ID="anas-4035"

        function post_family_config_branch_edge__anas_4035_use_mainline_uboot() {
        display_alert "$BOARD" "Mainline U-Boot overrides for $BOARD - $BRANCH" "info"
        declare -g BOOTCONFIG="anas-4035-rk3588s_defconfig"
        declare -g BOOTDELAY=1
        declare -g BOOTSOURCE="https://github.com/u-boot/u-boot.git"
        declare -g BOOTBRANCH="tag:v2025.07"
        declare -g BOOTPATCHDIR="v2025.07"
        declare -g BOOTDIR="u-boot-${BOARD}"
        declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
        unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd

        function write_uboot_platform() {
                dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
        }

}

function post_family_config_branch_vendor__ANAS-4035_use_custom_source() {
	KERNEL_MAJOR_MINOR="6.1"   # Major and minor versions of this kernel.
	KERNELBRANCH='branch:rk-6.1-rkr4.1'	
	KERNELPATCHDIR="rk35xx-vendor-6.1 rk35xx-vendor-6.1.84" # 페櫓userpatches/kernel/ 膽邱꿴冷賈痰 횔빈patch/kernel/페늴
}


