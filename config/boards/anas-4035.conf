function post_family_config__anas-4035_uboot_config() {
	if [[ ${BRANCH} = "legacy" || ${BRANCH} = "vendor" ]]; then
		# 使用 vendor U-Boot 配置 (legacy 和 vendor 分支共用)
		BOOTSOURCE='https://github.com/orangepi-xunlong/u-boot-orangepi.git'
		BOOTBRANCH='branch:v2017.09-rk3588'
		BOOTPATCHDIR="legacy"
	else
		# 使用 mainline U-Boot 配置 (默认)
		display_alert "$BOARD" "Mainline U-Boot overrides for $BOARD - $BRANCH" "info"
		declare -g BOOTCONFIG="anas-4035-rk3588s_defconfig"
		declare -g BOOTDELAY=1
		declare -g BOOTSOURCE="https://github.com/u-boot/u-boot.git"
		declare -g BOOTBRANCH="tag:v2025.07"
		declare -g BOOTPATCHDIR="v2025.07"
		declare -g BOOTDIR="u-boot-${BOARD}"
		declare -g UBOOT_TARGET_MAP="BL31=${RKBIN_DIR}/${BL31_BLOB} ROCKCHIP_TPL=${RKBIN_DIR}/${DDR_BLOB};;u-boot-rockchip.bin"
		unset uboot_custom_postprocess write_uboot_platform write_uboot_platform_mtd
		
		function write_uboot_platform() {
			dd "if=$1/u-boot-rockchip.bin" "of=$2" bs=32k seek=1 conv=notrunc status=none
		}
	fi
}


function post_family_tweaks__anas4035_fixed_mac_rtl8156_by_cpu_serial() {


    # Read 4 random bytes as hex (8 chars)
    local tail_hex
    tail_hex="$(hexdump -n 4 -v -e '/1 "%02x"' /dev/urandom)"

    local mac_8211
    mac_8211="aa:bb:${tail_hex:0:2}:${tail_hex:2:2}:${tail_hex:4:2}:${tail_hex:6:2}"

    local tail_dec usb_tail_dec usb_tail_hex mac_usb
    tail_dec=$(( 16#${tail_hex} ))
    usb_tail_dec=$(( (tail_dec + 1) & 0xffffffff ))
    usb_tail_hex="$(printf "%08x" "${usb_tail_dec}")"
    mac_usb="aa:bb:${usb_tail_hex:0:2}:${usb_tail_hex:2:2}:${usb_tail_hex:4:2}:${usb_tail_hex:6:2}"


    cat > "${SDCARD}/etc/systemd/network/10-8211.link" <<EOF
[Match]
Type=ether
Path=platform-fe1c0000.ethernet

[Link]
MACAddress=${mac_8211}
MACAddressPolicy=none
EOF


    cat > "${SDCARD}/etc/systemd/network/20-usb-rtl8156.link" <<EOF
[Match]
Type=ether
Driver=r8152
Property=ID_VENDOR_ID=0bda
Property=ID_MODEL_ID=8156

[Link]
MACAddress=${mac_usb}
MACAddressPolicy=none
EOF

    display_alert "$BOARD" "8211 MAC=${mac_8211}, USB8156 MAC=${mac_usb}" "info"
}


